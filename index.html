<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Taller Pancito</title>
    <!--hoja de estilos de bootstrap-->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

    <link rel="stylesheet" href="styles.css">
</head>

<body>

    <br>
    <div id="navbar" class="container"></div>
    <br>
    <div id="inicio" class="container"></div>
    <hr>
    <div id="destacados" class="container"></div>
    <hr>
    <div id="servicios" class="container"></div>
    <hr>
    <div id="productos" class="container"></div>
    <hr>
    <div id="contacto" class="container"></div>
    <hr>
    <div id="nosotros" class="container"></div>
    <hr>
    <div id="preguntas" class="container"></div>
    <br><br>
    <div id="footer" class="container"></div>


    <!-- modal de login -->
    <div class="modal fade" id="loginModal" tabindex="-1" aria-labelledby="exampleModalLabel" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <form>
                    <div class="modal-header">
                        <h5 class="modal-title" id="exampleModalLabel">Ingresar</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                    </div>
                    <div class="modal-body">
                        <div class="login">
                            <h6 class="modal-title text-center">Login</h5>
                                <div class="mb-3">
                                    <label for="inputUsername" class="form-label">Usuario</label>
                                    <input type="text" class="form-control" id="txtUsernameLogin">
                                </div>
                                <div class="mb-3">
                                    <label for="inputPassword" class="form-label">Contraseña</label>
                                    <input type="password" class="form-control" id="txtPasswordLogin">
                                </div>
                                <div class="mb-3 form-check">
                                    <input type="checkbox" class="form-check-input" id="cbxRecordame">
                                    <label class="form-check-label" for="cbxRecordame">Recordarme</label>

                                </div>
                                <button type="button" class="btn btn-primary d-block mx-auto"
                                    id="btnSubmitLogin">Ingresar</button>
                        </div>

                        <hr>

                        <div class="register">
                            <h6 class="modal-title text-center mb-3">No tienes una cuenta? Regístrate</h5>
                                <div class="mb-3">
                                    <label for="inputEmail" class="form-label">Correo electrónico</label>
                                    <input type="email" class="form-control" id="txtEmailRegister">
                                </div>
                                <div class="mb-3">
                                    <label for="inputUsername" class="form-label">Usuario</label>
                                    <input type="text" class="form-control" id="txtUsernameRegister">
                                </div>
                                <div class="mb-3">
                                    <label for="inputPassword" class="form-label">Contraseña</label>
                                    <input type="password" class="form-control" id="txtPasswordRegister">
                                </div>
                                <button type="button" class="btn btn-primary d-block mx-auto"
                                    id="btnSubmitRegister">Crear cuenta</button>
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cerrar</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!--script de javascript de bootstrap-->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>

</body>
<script src="scripts.js"></script>
<script src="https://kit.fontawesome.com/c2f3cf970d.js" crossorigin="anonymous"></script>
</html>
