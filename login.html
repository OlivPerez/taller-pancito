<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
</head>

<body>
    <!--contenido de login-->
    <div class="container-login">
        <h3 class="text-center">Iniciar Sesión</h3>
        <form>
            <div class="mb-3">
                <label for="inputUsername" class="form-label">Usuario</label>
                <input type="text" class="form-control" id="txtUsername">
            </div>
            <div class="mb-3">
                <label for="inputPassword" class="form-label">Contraseña</label>
                <input type="password" class="form-control" id="txtPassword">
            </div>
            <div class="mb-3 form-check">
                <input type="checkbox" class="form-check-input" id="cbxRecordame">
                <label class="form-check-label" for="cbxRecordame">Recordarme</label>
            </div>
            <button type="button" class="btn btn-primary" id="btnSubmit">Ingresar</button>
        </form>

    </div>
</body>

</html>
